# =============================================================================
# Pagayo Platform Smoke Tests — Geautomatiseerd
# =============================================================================
# Draait alle smoke tests tegen productie elke 6 uur.
# Tests maken live HTTP calls naar:
#   - beheer.pagayo.com
#   - test-3.pagayo.app (storefront)
#   - api.pagayo.com
#   - www.pagayo.com
#
# Manueel triggeren: Actions → "Platform Smoke Tests" → Run workflow
# =============================================================================

name: Platform Smoke Tests

on:
  schedule:
    # Elke 6 uur: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: "0 0,6,12,18 * * *"

  workflow_dispatch:
    inputs:
      suite:
        description: "Welke test suite draaien?"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - beheer
          - storefront
          - api-stack
          - marketing
          - infrastructure
          - headers

concurrency:
  group: smoke-tests
  cancel-in-progress: true

jobs:
  smoke-tests:
    name: "Smoke Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests (all)
        if: ${{ github.event_name == 'schedule' || inputs.suite == 'all' }}
        run: npm run test:smoke
        env:
          CI: true

      - name: Run smoke tests (specifieke suite)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.suite != 'all' }}
        run: npx vitest run tests/smoke/${{ inputs.suite }}.test.ts
        env:
          CI: true

  # =========================================================================
  # JOB 2b: Failure Notification — automatisch issue bij smoke test failure
  # =========================================================================
  notify-on-failure:
    name: "Notify on Failure"
    runs-on: ubuntu-latest
    needs: [smoke-tests]
    if: failure()

    steps:
      - name: Create GitHub Issue on failure
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const title = `🚨 Smoke test FAILED — ${today}`;

            // Check of er al een open issue is (voorkom duplicaten)
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'critical,automated',
              state: 'open',
            });

            if (existing.data.length > 0) {
              // Voeg comment toe aan bestaand issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `Smoke tests opnieuw gefaald: [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              });
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `## Smoke tests gefaald\n\nCheck de [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).\n\n**Actie:** Controleer Worker secrets en deployment status.\n\n\`\`\`bash\nnpx wrangler secret list --env production\n\`\`\``,
              labels: ['critical', 'automated'],
            });

  header-compliance:
    name: "Header Compliance"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Headers apart — dit is een zwaardere test suite
    if: ${{ github.event_name == 'schedule' || inputs.suite == 'all' || inputs.suite == 'headers' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run header compliance tests
        run: npm run test:smoke:headers
        env:
          CI: true

  # =========================================================================
  # JOB 3: Quality Tests (typecheck, lint, dependency-sync, unit-tests)
  # =========================================================================
  quality-tests:
    name: "Quality Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Draait dagelijks om 06:00 UTC (minder frequent dan smoke — zwaarder)
    if: ${{ github.event_name == 'schedule' || inputs.suite == 'all' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run quality tests
        run: npm run test:quality
        env:
          CI: true
