# =============================================================================
# Update Release Manifest
# -----------------------------------------------------------------------------
# Wordt getriggerd door staging-deploy workflows van consumer-repo's nadat hun
# smoke tests groen zijn. Werkt releases/current.json bij via een branch + PR
# zodat branch protection op main gerespecteerd blijft. Optioneel: secret
# RELEASE_MANIFEST_MERGE_PAT voert direct admin-merge uit (zie RUNBOOK §9).
#
# Consumers triggeren via:
#   gh workflow run update-release-manifest.yml \
#     -R Pagayo/pagayo-maintenance \
#     --ref main \
#     -f repo=<repo-name> \
#     -f sha=<full-sha>
# =============================================================================

name: Update Release Manifest

on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'Consumer repo naam (bv. pagayo-storefront)'
        required: true
        type: string
      sha:
        description: 'Full 40-char git SHA die groen door staging-smoke kwam'
        required: true
        type: string

concurrency:
  group: update-release-manifest
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update manifest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Validate inputs
        env:
          REPO: ${{ inputs.repo }}
          SHA:  ${{ inputs.sha }}
        run: |
          if ! [[ "$SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::sha moet een full 40-char git SHA zijn (gekregen: '$SHA')"
            exit 1
          fi
          if [[ -z "$REPO" ]]; then
            echo "::error::repo input is verplicht"
            exit 1
          fi

      - name: Run update script
        id: prepare
        env:
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          chmod +x scripts/update-release-manifest.sh
          scripts/update-release-manifest.sh "${{ inputs.repo }}" "${{ inputs.sha }}" --write-only

      - name: Create or update manifest PR
        id: manifest_pr
        if: steps.prepare.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: |
            releases/current.json
          branch: ${{ steps.prepare.outputs.pr_branch }}
          base: main
          delete-branch: true
          commit-message: ${{ steps.prepare.outputs.commit_message }}
          title: ${{ steps.prepare.outputs.pr_title }}
          body: |
            ## Release manifest update

            - Repo: `${{ inputs.repo }}`
            - Verified staging SHA: `${{ inputs.sha }}`
            - Triggered by: `${{ github.actor }}`

            Deze PR is automatisch aangemaakt door `update-release-manifest.yml`.
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>

      - name: Report PR status
        if: steps.prepare.outputs.changed == 'true'
        run: |
          if [[ -z "${{ steps.manifest_pr.outputs.pull-request-number }}" ]]; then
            echo "::error::Manifest wijzigde, maar er is geen pull request aangemaakt of bijgewerkt."
            exit 1
          fi

          if [[ "${{ steps.manifest_pr.outputs.pull-request-operation }}" == "created" ]]; then
            echo "✅ Pull request aangemaakt: #${{ steps.manifest_pr.outputs.pull-request-number }}"
          elif [[ "${{ steps.manifest_pr.outputs.pull-request-operation }}" == "updated" ]]; then
            echo "ℹ️  Bestaande pull request bijgewerkt: #${{ steps.manifest_pr.outputs.pull-request-number }}"
          else
            echo "ℹ️  Pull request status: ${{ steps.manifest_pr.outputs.pull-request-operation }} (#${{ steps.manifest_pr.outputs.pull-request-number }})"
          fi

      # Optioneel: zet repository secret RELEASE_MANIFEST_MERGE_PAT (classic `repo` of
      # org-admin PAT met merge-rechten) zodat manifest-PR's direct op main komen wanneer
      # branch rules auto-merge blokkeren (bv. required review zonder bot-bypass).
      - name: Try immediate merge with bypass PAT
        id: pat_merge
        if: steps.prepare.outputs.changed == 'true' && steps.manifest_pr.outputs.pull-request-number != ''
        env:
          MERGE_PAT: ${{ secrets.RELEASE_MANIFEST_MERGE_PAT }}
        run: |
          echo "merged=false" >> "$GITHUB_OUTPUT"
          if [ -z "${MERGE_PAT:-}" ]; then
            echo "ℹ️ Geen RELEASE_MANIFEST_MERGE_PAT — alleen auto-merge."
            exit 0
          fi
          PR="${{ steps.manifest_pr.outputs.pull-request-number }}"
          export GH_TOKEN="$MERGE_PAT"
          echo "🔀 Probeer PR #$PR te mergen met RELEASE_MANIFEST_MERGE_PAT..."
          if gh pr merge "$PR" --repo "${{ github.repository }}" --squash --admin; then
            echo "merged=true" >> "$GITHUB_OUTPUT"
            echo "✅ Manifest PR #$PR direct gemerged (bypass PAT)."
          else
            echo "::warning::PAT-merge mislukt (rechten of PR-status); val terug op auto-merge."
          fi

      - name: Enable auto-merge
        if: >-
          steps.prepare.outputs.changed == 'true' &&
          steps.manifest_pr.outputs.pull-request-number != '' &&
          steps.pat_merge.outputs.merged != 'true'
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.manifest_pr.outputs.pull-request-number }}
          merge-method: squash

      - name: No manifest change
        if: steps.prepare.outputs.changed != 'true'
        run: echo "ℹ️  Geen manifest-wijziging nodig; er is geen PR geopend."
