# =============================================================================
# Reusable: Pagayo Stack Manifest Drift Guard
# =============================================================================
# Scant de caller repo op verboden stack-termen (zie STACK-MANIFEST.md voor de
# volledige lijst) buiten de allow-list. Single source of truth:
# pagayo-maintenance/scripts/check-stack-manifest.sh.
#
# Gebruik vanuit een consumer repo (bv. storefront/ci.yml):
#
#   jobs:
#     stack-check:
#       uses: Pagayo/pagayo-maintenance/.github/workflows/reusable-check-stack.yml@main
#
# Referentie: pagayo-vault/STACK-MANIFEST.md
# =============================================================================

name: Reusable Stack Check

on:
  workflow_call:

jobs:
  stack-check:
    name: Stack Manifest Drift Guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v6

      - name: Checkout pagayo-maintenance (script + manifest)
        uses: actions/checkout@v6
        with:
          repository: Pagayo/pagayo-maintenance
          # Default branch (main) wordt gebruikt. Consumer-repos die deze workflow
          # aanroepen via `@main` krijgen de laatst-stabiele versie.
          # Geen `github.workflow_sha` — dat resolveert in workflow_call vanuit
          # pull_request events naar de caller's merge-SHA → "not our ref".
          ref: main
          path: .maintenance

      # Meestal staat `rg` al op ubuntu-latest. Als die ontbreekt: géén apt-get hier —
      # `apt-get update`/`install` hangt soms minutenlang (mirrors/locks). Pin upstream
      # musl-binary (curl + tar) is snel en deterministisch.
      - name: Install ripgrep (fallback — GitHub release, no apt)
        run: |
          set -euo pipefail
          if command -v rg >/dev/null 2>&1; then
            echo "ripgrep (rg) already on PATH — skipping install"
            exit 0
          fi
          RG_VER=14.1.1
          RG_TGZ="ripgrep-${RG_VER}-x86_64-unknown-linux-musl.tar.gz"
          RG_DIR="ripgrep-${RG_VER}-x86_64-unknown-linux-musl"
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          curl -fsSL --max-time 120 \
            "https://github.com/BurntSushi/ripgrep/releases/download/${RG_VER}/${RG_TGZ}" \
            | tar xz -C "$tmp"
          sudo install -m 0755 "${tmp}/${RG_DIR}/rg" /usr/local/bin/rg
          rg --version

      - name: Run drift guard (single-repo mode)
        env:
          CHECK_TARGET: ${{ github.workspace }}
        run: bash .maintenance/scripts/check-stack-manifest.sh
