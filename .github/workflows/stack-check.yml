# =============================================================================
# Pagayo Maintenance - Stack Manifest Drift Guard (zelf-test)
# =============================================================================
# Draait de drift-guard op deze repo zelf via de reusable workflow.
# Dit garandeert dat script-wijzigingen niet zelf drift introduceren.
# =============================================================================

name: Stack Check

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Zelfde repo: gebruik een relatieve `uses:` zodat PR’s altijd de reusable op
  # **dezelfde ref** draaien. Een pin naar een oude feature-branch (bv. 20260416)
  # laat CI eeuwig de verouderde reusable draaien — inclusief apt-fallback voor rg.
  stack-check:
    uses: ./.github/workflows/reusable-check-stack.yml
