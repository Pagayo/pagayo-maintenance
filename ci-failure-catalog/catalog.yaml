      - CI
    jobs:
      - Validate
    match:
      patterns:
        - npm ci
        - package-lock.json
        - lock file
        - EUSAGE
        - "npm error code EUSAGE"
    prevention:
      layer: ci-doctor
      ref: npm ci locally after package.json changes
    fix:
      playbook: pagayo-vault/.github/release-playbooks/01-commit-push.md
      summary: Run npm install in the affected repo, commit package-lock.json with package.json changes.
    status: active
    confidence: high

