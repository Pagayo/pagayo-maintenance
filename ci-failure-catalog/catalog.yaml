  - id: client-shard-oom
    title: Client test shard heap out of memory
    classification: flake
    repos:
      - pagayo-storefront
    workflows:
      - CI
    jobs:
      - Client Tests
    match:
      patterns:
        - heap out of memory
        - JavaScript heap out of memory
        - Ineffective mark-compacts
    prevention:
      layer: none
      ref: ci.yml OOM-aware retry policy — do not retry OOM; split shards further
    fix:
      playbook: pagayo-storefront/docs/LOCAL-CI.md
      summary: >-
        OOM is deterministic — reduce shard size or isolate heavy tests; run npm run ci:replay for
        the failing shard locally with NODE_OPTIONS heap increase only for diagnosis.
    status: active
    confidence: high

