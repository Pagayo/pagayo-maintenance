# CI Failure Catalog — SSoT for known GitHub Actions failure patterns.
# See README.md for entry lifecycle. Stats live in stats.json (generated).

version: 1

entries:
  - id: design-asset-version-drift
    title: Design asset version mismatch after @pagayo/design bump
    classification: ai-behavioral
    repos:
      - pagayo-storefront
    workflows:
      - CI
    jobs:
      - Validate
    match:
      patterns:
        - design:verify-asset-version
        - DESIGN_ASSET_VERSION
        - design-asset-version
    prevention:
      layer: preflight
      ref: deployer-preflight.sh CHECK 7 + npm run design:verify-asset-version
    fix:
      playbook: pagayo-vault/.github/release-playbooks/README.md
      summary: >-
        Bump @pagayo/design in lockfile, run PAGAYO_DESIGN_SOURCE=node_modules npm run copy-design,
        commit design-asset-version.ts in the same batch as the lockfile bump.
    status: active
    confidence: high

  - id: design-local-npm-drift
    title: Local pagayo-design dist differs from npm lockfile
    classification: ai-behavioral
    repos:
      - pagayo-storefront
    workflows:
      - CI
      - Deploy to Cloudflare Workers
    match:
      patterns:
        - "@pagayo/design"
        - webshop.css
        - lokaal.*npm
        - CSS mismatch
    prevention:
      layer: preflight
      ref: deployer-preflight.sh CHECK 7
    fix:
      playbook: pagayo-vault/.github/release-playbooks/README.md
      summary: >-
        Publish pagayo-design to GitHub Packages, bump storefront lockfile to that semver,
        copy-design from node_modules, preflight green before push.
    status: active
    confidence: high

  - id: lockfile-desync
